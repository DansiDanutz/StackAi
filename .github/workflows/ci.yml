# Stack Ai OS — continuous integration
#
# Runs on every push to main and every PR: typecheck, unit tests, integration
# test, and a build. The `node:sqlite` experimental builtin (Node 22+) requires
# the --experimental-sqlite flag on Node < 24, so we pin Node 24.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests (vitest)
        run: pnpm test

      - name: Integration test (run store via tsx)
        run: pnpm test:integration

      - name: Build
        run: pnpm build

      - name: Verify the built CLI runs
        run: node dist/cli/index.js --version

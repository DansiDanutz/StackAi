defaults:
  ensemble:
    agents:
    - claude
    - codex
    - gemini
    judge: claude
    model: auto
  judge:
    agent: claude
    model: opus
  pipeline:
    agents:
    - claude
    - codex
    model: auto
  solo:
    model: auto
models:
- alias: sonnet
  providers:
    claude: claude-sonnet-4-6
    hermes: anthropic/claude-sonnet-4
    kimi: claude-sonnet-4-6
    openclaude: claude-sonnet-4-6
    opencode: anthropic/claude-sonnet-4
- alias: opus
  providers:
    claude: claude-opus-4-6
    kimi: claude-opus-4-6
    openclaude: claude-opus-4-6
    opencode: anthropic/claude-opus-4
- alias: gpt5
  providers:
    codex: gpt-5-codex
- alias: gemini-pro
  providers:
    gemini: gemini-3-pro
- alias: kimi-latest
  providers:
    kimi: kimi-latest
- alias: kimi-code
  providers:
    kimi: kimi-k2.7-code
- alias: qwen-local
  providers:
    openclaude: qwen3-8b
    pi: qwen3:8b
- alias: qwen-coder
  providers:
    openclaude: qwen3-coder-480b
- alias: fugu
  providers:
    fugu: fugu
- alias: fugu-ultra
  providers:
    fugu: fugu-ultra
- alias: deepseek-chat
  providers:
    deepseek: deepseek-chat
- alias: deepseek-r1
  providers:
    deepseek: deepseek-reasoner
- alias: mlx-local
  providers:
    openclaude: mlx-community/Llama-3.2-3B-Instruct-4bit
